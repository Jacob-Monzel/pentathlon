<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pentathlon">
<meta name="theme-color" content="#EEF2F7">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Pentathlon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="center">
  <div class="login">
    <div class="mark">Pentathlon</div>
    <input type="email" id="email" placeholder="email" autocomplete="username" autocapitalize="none">
    <input type="password" id="pw" placeholder="password" autocomplete="current-password">
    <button class="primary" id="signin">Sign in</button>
    <button class="ghostbtn" id="signup">Create account</button>
    <div class="fineprint" id="msg"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  Cloud.init();
  const msg = document.getElementById('msg');
  const set = (t, err) => { msg.textContent = t; msg.style.color = err ? 'var(--red)' : 'var(--muted)'; };

  if (!Cloud.ready()) {
    set('Add your Supabase URL + anon key to config.js, then re-upload.', true);
    signin.disabled = signup.disabled = true;
  } else {
    Cloud.session().then(s => { if (s) location.replace('index.html'); });
  }

  const creds = () => ({ email: email.value.trim(), pw: pw.value });
  signin.onclick = async () => {
    const { email: e, pw: p } = creds();
    if (!e || !p) return set('Enter your email and password.', true);
    set('Signing in…');
    const { error } = await Cloud.signIn(e, p);
    if (error) return set(error.message, true);
    location.href = 'index.html';
  };
  signup.onclick = async () => {
    const { email: e, pw: p } = creds();
    if (!e || !p) return set('Enter an email and a password (6+ characters).', true);
    set('Creating account…');
    const { data, error } = await Cloud.signUp(e, p);
    if (error) return set(error.message, true);
    if (data.session) location.href = 'index.html';
    else set('Account created. Check your email to confirm, then sign in.');
  };
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') signin.click(); });
</script>
</body>
</html>
