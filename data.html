<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pentathlon">
<meta name="theme-color" content="#EEF2F7">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Pentathlon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <button id="exp" class="primary">Export data (.json)</button>
  <button id="imp" class="ghostbtn">Import from file</button>
  <input type="file" id="impFile" accept="application/json" hidden>
  <button id="wipe" class="dangerbtn">Erase everything</button>
  <div class="links"><a href="index.html">Back</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  boot(async () => {

  exp.onclick = () => {
    const blob = new Blob([JSON.stringify(Store.get(), null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rackfile-' + todayISO() + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  imp.onclick = () => impFile.click();
  impFile.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!d.sessions) throw 0;
        Store.set(Object.assign(Store.get(), d));
        alert('Imported.');
      } catch (x) { alert('Could not read that file.'); }
    };
    r.readAsText(f);
  };

  wipe.onclick = () => {
    if (confirm('Erase all sessions and episodes? Export first if unsure.')) {
      Store.update(s => { s.sessions = []; s.episodes = []; s.activities = []; });
      alert('Erased.');
    }
  };
  });
</script>
</body>
</html>
