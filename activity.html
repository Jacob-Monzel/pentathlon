<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pentathlon">
<meta name="theme-color" content="#EEF2F7">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Pentathlon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <div class="dayhead">
    <a href="#" class="back" id="back">&lsaquo;</a>
    <div class="dayttl" id="dayttl"></div>
  </div>
  <div id="form"></div>
  <button class="primary" id="save">Save</button>
  <button class="dangerbtn" id="del" hidden>Delete</button>
</div>
<script src="app.js"></script>
<script>
  Auth.guard();
  const p = new URLSearchParams(location.search);
  const date = p.get('date') || todayISO();
  const editId = p.get('id');
  const existing = editId ? getActivity(editId) : null;
  const type = existing ? existing.type : (p.get('type') || 'run');
  const backTo = () => location.href = 'day.html?date=' + date;
  back.onclick = e => { e.preventDefault(); backTo(); };

  const isCardio = type === 'run' || type === 'swim';
  const spec = ACT[type];
  if (!spec) backTo();
  dayttl.innerHTML = `${spec.emoji} ${spec.label} <span class="ttl-date">${prettyDate(date)}</span>`;

  // ---------- FENCE / NINJA : simple generic form ----------
  function renderSimple() {
    form.innerHTML = spec.fields.map(f => {
      const val = existing ? (existing[f.k] ?? '') : (f.def ?? '');
      if (f.t === 'sel') return `<label class="field"><span>${f.label}</span><select data-k="${f.k}">` +
        f.opts.map(o => `<option value="${o}"${o===val?' selected':''}>${o}</option>`).join('') + `</select></label>`;
      const mode = f.t === 'num' ? 'decimal' : f.t === 'time' ? 'numeric' : 'text';
      const ph = f.t === 'time' ? 'mm:ss' : '';
      return `<label class="field"><span>${f.label}</span><input type="text" inputmode="${mode}" data-k="${f.k}" value="${val}" placeholder="${ph}"></label>`;
    }).join('');
    save.onclick = () => {
      const a = { id: editId || undefined, type, date };
      form.querySelectorAll('[data-k]').forEach(el => a[el.dataset.k] = el.value.trim());
      saveActivity(a); backTo();
    };
  }

  // ---------- RUN / SWIM : intensity + unit + mode + builder ----------
  let state = existing ? JSON.parse(JSON.stringify(existing)) : {
    type, date, mode: 'cont', intensity: 'easy',
    unit: type === 'run' ? 'mi' : 'yd',
    distance: '', time: '', segments: [], note: ''
  };
  if (!state.segments) state.segments = [];
  const units = type === 'run' ? ['mi','km'] : ['yd','m'];
  const kinds = SEG_KINDS[type];
  const perLabel = type === 'run' ? '/' + state.unit : '/100';

  function segPace(s) {
    const sec = parseTime(s.time), d = +s.distance || 0;
    if (!sec || !d) return '';
    return type === 'run' ? `${fmtDur(sec/d)}/${state.unit}` : `${fmtDur(sec/(d/100))}/100`;
  }

  function renderCardio() {
    form.innerHTML = `
      <div class="field"><span>Suggested sessions</span>
        <div class="tpls" id="tpls">${TEMPLATES[type].map(t=>`<button data-t="${t.id}" title="${t.desc}">${t.label}</button>`).join('')}</div></div>
      <div class="field"><span>Intensity</span>
        <div class="seg-ctl" id="intensity">${INTENSITIES.map(([v,l]) =>
          `<button data-v="${v}" class="${state.intensity===v?'on':''}">${l}</button>`).join('')}</div></div>
      <div class="field"><span>Units</span>
        <div class="seg-ctl narrow" id="unit">${units.map(u =>
          `<button data-v="${u}" class="${state.unit===u?'on':''}">${u}</button>`).join('')}</div></div>
      <div class="field"><span>Session type</span>
        <div class="seg-ctl" id="mode">
          <button data-v="cont" class="${state.mode==='cont'?'on':''}">Continuous</button>
          <button data-v="struct" class="${state.mode==='struct'?'on':''}">Intervals</button></div></div>
      <div id="contBox" ${state.mode!=='cont'?'hidden':''}>
        <label class="field"><span>Distance (${state.unit})</span><input type="text" inputmode="decimal" id="c-dist" value="${state.distance||''}"></label>
        <label class="field"><span>Time (mm:ss)</span><input type="text" inputmode="numeric" id="c-time" value="${state.time||''}" placeholder="mm:ss"></label>
        <div class="pacehint" id="contPace"></div>
      </div>
      <div id="structBox" ${state.mode!=='struct'?'hidden':''}>
        <div class="segs" id="segs"></div>
        <button class="addset-btn" id="addSeg">+ add set</button>
        <div class="segtotal" id="segTotal"></div>
      </div>
      <label class="field"><span>Note</span><input type="text" id="note" value="${state.note||''}" placeholder="anything worth remembering"></label>`;

    // template picker — load a full session, keep any note already typed
    form.querySelector('#tpls').onclick = e => { const b=e.target.closest('button'); if(!b) return;
      const t=TEMPLATES[type].find(x=>x.id===b.dataset.t); if(!t) return;
      const keepNote=state.note;
      state=Object.assign({type,date,note:keepNote},JSON.parse(JSON.stringify(t.s)));
      if(!state.segments) state.segments=[];
      renderCardio(); };

    // intensity / unit / mode selectors
    form.querySelector('#intensity').onclick = e => { const b=e.target.closest('button'); if(!b)return;
      state.intensity=b.dataset.v; form.querySelectorAll('#intensity button').forEach(x=>x.classList.toggle('on',x===b)); };
    form.querySelector('#unit').onclick = e => { const b=e.target.closest('button'); if(!b)return;
      state.unit=b.dataset.v; renderCardio(); };
    form.querySelector('#mode').onclick = e => { const b=e.target.closest('button'); if(!b)return;
      state.mode=b.dataset.v; document.getElementById('contBox').hidden=state.mode!=='cont';
      document.getElementById('structBox').hidden=state.mode!=='struct';
      form.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b)); };

    // continuous fields
    const cd=form.querySelector('#c-dist'), ct=form.querySelector('#c-time');
    const contPace=() => { const sec=parseTime(ct.value), d=+cd.value||0;
      document.getElementById('contPace').textContent = (sec&&d)
        ? (type==='run'?`${fmtDur(sec/d)}/${state.unit}`:`${fmtDur(sec/(d/100))}/100`) : ''; };
    cd.oninput=()=>{state.distance=cd.value;contPace();}; ct.oninput=()=>{state.time=ct.value;contPace();}; contPace();

    renderSegs();
    form.querySelector('#addSeg').onclick=()=>{ state.segments.push({reps:'1',distance:'',time:'',rest:'',kind:kinds[0],label:''}); renderSegs(); };
  }

  function renderSegs() {
    const wrap=form.querySelector('#segs'); if(!wrap) return;
    wrap.innerHTML = state.segments.map((s,i)=>`
      <div class="seg" data-i="${i}">
        <div class="seg-l1">
          <input class="s-reps" inputmode="numeric" value="${s.reps||''}" placeholder="reps">
          <span class="seg-x">\u00d7</span>
          <input class="s-dist" inputmode="decimal" value="${s.distance||''}" placeholder="dist">
          <span class="seg-u">${state.unit}</span>
          <button class="seg-del">\u2715</button>
        </div>
        <div class="seg-l2">
          <select class="s-kind">${kinds.map(k=>`<option${k===s.kind?' selected':''}>${k}</option>`).join('')}</select>
          <input class="s-label" value="${s.label||''}" placeholder="label / drill name">
        </div>
        <div class="seg-l3">
          <input class="s-time" inputmode="numeric" value="${s.time||''}" placeholder="time / rep">
          <input class="s-rest" inputmode="numeric" value="${s.rest||''}" placeholder="rest / send-off">
          <span class="seg-pace">${segPace(s)}</span>
        </div>
      </div>`).join('');
    wrap.querySelectorAll('.seg').forEach(el=>{
      const i=+el.dataset.i, s=state.segments[i];
      const bind=(sel,key,pace)=>{ const inp=el.querySelector(sel); inp.oninput=()=>{ s[key]=inp.value;
        if(pace){ el.querySelector('.seg-pace').textContent=segPace(s); updTotal(); } if(key==='reps'||key==='distance')updTotal(); }; };
      bind('.s-reps','reps'); bind('.s-dist','distance'); bind('.s-time','time',true); bind('.s-rest','rest');
      el.querySelector('.s-kind').onchange=e=>s.kind=e.target.value;
      el.querySelector('.s-label').oninput=e=>s.label=e.target.value;
      el.querySelector('.seg-del').onclick=()=>{ state.segments.splice(i,1); renderSegs(); };
    });
    updTotal();
  }
  function updTotal(){ const t=form.querySelector('#segTotal'); if(t) t.textContent=`Total: ${actTotals(state).dist} ${state.unit}`; }

  if (isCardio) {
    renderCardio();
    save.onclick = () => {
      state.note = (form.querySelector('#note').value||'').trim();
      const a = { id: editId || undefined, ...state };
      if (a.mode==='cont'){ a.segments=[]; } else { a.distance=''; a.time=''; }
      saveActivity(a); backTo();
    };
  } else {
    renderSimple();
  }

  if (editId) { del.hidden=false; del.onclick=()=>{ if(confirm('Delete this activity?')){ deleteActivity(editId); backTo(); } }; }
</script>
</body>
</html>
